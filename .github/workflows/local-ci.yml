# Local CI Testing Workflow
# Run this with: act -j local-ci -W .github/workflows/local-ci.yml
# Or just: act push (to test the main build.yml)

name: Local CI

on:
  workflow_dispatch:
  push:
    branches: [local-test]

jobs:
  local-ci:
    name: Test CI Locally
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-wasip2

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime
          cache-on-failure: true

      - name: Setup Moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Moon manages everything: Rust quality, WASM build, transpile, frontend build + test
      - name: Build and Test
        run: |
          moon run \
            runtime:fmt-check \
            runtime:check \
            runtime:build-wasm \
            runtime:verify-wasm \
            runtime:check-native \
            runtime:test \
            frontend:build \
            frontend:copy-externals \
            frontend:test

      - name: Summary
        run: |
          echo "✅ Local CI passed!"
          echo "WASM: $(ls -la target/wasm32-wasip2/release/*.wasm | wc -l) components"
          echo "Moon cache: $(du -sh .moon/cache 2>/dev/null || echo 'no cache')"
