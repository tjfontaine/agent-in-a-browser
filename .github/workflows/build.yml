name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest-8-cores

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init stripe-cli-wasm/stripe-cli

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            runtime
          cache-on-failure: true
          # Don't cache ~/.cargo/bin — it causes cargo binstall to skip
          # reinstalling tools (wit-deps, cargo-component, wasm-tools) because
          # metadata (.crates.toml) is restored but binaries are pruned
          cache-bin: "false"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.22.0"
          cache: "pnpm"

      - name: Setup Moon
        uses: moonrepo/setup-toolchain@v0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: stripe-cli-wasm/stripe-cli/go.sum

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Moon manages the full pipeline including Go→WASM build.
      # Go build cache (GOCACHE) is persisted by actions/setup-go, making
      # subsequent builds near-instant even though Moon re-runs build-go-wasm.
      - name: Build and Test
        timeout-minutes: 30
        run: |
          moon run \
            runtime:fmt-check \
            runtime:check \
            runtime:build-wasm \
            runtime:verify-wasm \
            runtime:check-native \
            runtime:test \
            frontend:build \
            frontend:copy-externals \
            frontend:test

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-dist
          path: frontend/dist
          include-hidden-files: true
          retention-days: 7

  e2e:
    name: E2E Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.22.0"
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Get Playwright Version
        id: playwright-version
        run: echo "version=$(cd frontend && npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: frontend
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }}
        timeout-minutes: 10

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30

  website:
    name: Build Website
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.22.0"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist
          retention-days: 7
