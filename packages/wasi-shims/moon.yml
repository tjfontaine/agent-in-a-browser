$schema: "https://moonrepo.dev/schemas/project.json"

tasks:
  build:
    script: "tsc && node scripts/build-browser.mjs"
    deps:
      - "wasm-loader:build"
    inputs:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "tsconfig.json"
    outputs:
      - "dist"
      - "browser-dist"
