$schema: "https://moonrepo.dev/schemas/project.json"

language: rust
layer: library
tags: ["rust"]

workspace:
  inheritedTasks:
    exclude: ["build"]

fileGroups:
  rust-sources:
    - "src/**"
    - "crates/*/src/**"
  cargo-configs:
    - "Cargo.toml"
    - "crates/*/Cargo.toml"
    - "/Cargo.toml"
    - "/Cargo.lock"
  wit-files:
    - "wit/**"
    - "crates/*/wit/**"

tasks:
  build-wasm:
    command: "cargo component build --release --target wasm32-wasip2"
    inputs:
      - "@group(rust-sources)"
      - "@group(cargo-configs)"
      - "@group(wit-files)"
    outputs:
      - "/target/wasm32-wasip2/release/ts_runtime_mcp.wasm"
      - "/target/wasm32-wasip2/release/tsx_engine.wasm"
      - "/target/wasm32-wasip2/release/sqlite_module.wasm"
      - "/target/wasm32-wasip2/release/ratatui_demo.wasm"
      - "/target/wasm32-wasip2/release/edtui_module.wasm"
      - "/target/wasm32-wasip2/release/web_agent_tui.wasm"
      - "/target/wasm32-wasip2/release/web_headless_agent.wasm"
    options:
      runInCI: true

  fmt-check:
    command: "cargo fmt --all --check"
    inputs:
      - "src/**/*.rs"
      - "crates/*/src/**/*.rs"
    options:
      runInCI: true
      cache: false

  check:
    command: "cargo check --workspace --all-targets --exclude wasmtime-runner"
    inputs:
      - "@group(rust-sources)"
      - "@group(cargo-configs)"
      - "@group(wit-files)"
    options:
      runInCI: true

  test:
    command: "cargo test --features sqlite"
    inputs:
      - "@group(rust-sources)"
      - "@group(cargo-configs)"
    options:
      runInCI: true

  transpile-ios:
    command: "node ../scripts/transpile.mjs web-headless-agent-ios"
    inputs:
      - "/target/wasm32-wasip2/release/web_headless_agent.wasm"
      - "/scripts/transpile.mjs"
    deps:
      - "~:build-wasm"
    options:
      runInCI: false
